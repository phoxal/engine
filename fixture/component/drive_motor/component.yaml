version: v1
capabilities:
  motor:
    kind: motor
    command: velocity
    # generic drive motor fixture specs:
    # - locked-rotor torque: 2.0 Nm
    # - no-load speed: 200 rpm
    max_torque_nm: 2.0
    max_velocity_radps: 20.943951
    gear_ratio: 1.0
    target:
      kind: joint
      id: motor_joint
  encoder:
    kind: encoder
    publish_rate_hz: 50.0
    gear_ratio: 1.0
    encoder_type: incremental
    counts_per_revolution: 4096
    target:
      kind: joint
      id: motor_joint
