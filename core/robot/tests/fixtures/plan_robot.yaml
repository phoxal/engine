version: v1

phoxal:
  cli_min_version: "^0.6"

identity:
  id: robot-v1
  namespace: dev

structure: structure.urdf

phoxal_runtimes:
  version: "^0.1"
  overrides:
    drive:
      version: "latest"
    localize:
      version: "0.1.4"
    router:
      image: "ghcr.io/phoxal/runtime-router"
      version: "^0.1"

user_runtimes:
  mission_behavior:
    path: ./runtimes/mission_behavior
  inspection_policy:
    path: ./runtimes/inspection_policy

motion:
  kinematic:
    kind: differential
    left_actuators: [left_drive.motor]
    right_actuators: [right_drive.motor]
    left_encoders: [left_drive.encoder]
    right_encoders: [right_drive.encoder]
    wheel_radius_m: 0.12
    wheel_base_m: 0.6

components:
  sources:
    oak_d_lite:
      git: https://github.com/phoxal/component-oak_d_lite
      tag: main
    ddsm115:
      git: https://github.com/phoxal/component-ddsm115
      tag: main
    passive_caster:
      path: ./components/passive_caster
  instances:
    left_drive:
      component: ddsm115
      mount_link: left_wheel_mount
      driver:
        connection: { type: can, bus: 0, node_id: 1 }
    front_camera:
      component: oak_d_lite
      mount_link: front_camera_mount
      driver:
        connection: { type: usb }
      roles:
        rgb: [localization]
        depth: [localization, mapping, traversability]
