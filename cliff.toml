[changelog]
header = """
# Changelog

All notable changes documented here. The format follows
[Keep a Changelog](https://keepachangelog.com/) and the project follows
[Semantic Versioning](https://semver.org/).
"""
body = """
{% if version %}
## [{{ version | trim_start_matches(pat="v") }}]\
(https://github.com/phoxal/{{ remote.github.repo }}/releases/tag/{{ version }}) \
- {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}
## [Unreleased]
{% endif %}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
  - {% if commit.scope %}*({{ commit.scope }})* {% endif %}\
    {{ commit.message | upper_first }}{% if commit.breaking %} [**breaking**]{% endif %}\
{% endfor %}
{% endfor %}
"""
footer = ""
trim = true

[git]
conventional_commits = true
filter_unconventional = false
commit_parsers = [
  { message = "^feat", group = "Added" },
  { message = "^fix", group = "Fixed" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Refactored" },
  { message = "^test", group = "Tests" },
  { message = "^docs", group = "Documentation" },
  { message = "^chore\\(release\\)", skip = true },
  { message = "^chore", group = "Other" },
  { message = "^ci", group = "CI" },
  { body = ".*security", group = "Security" },
]
protect_breaking_commits = true
filter_commits = false
tag_pattern = "v[0-9]*"
