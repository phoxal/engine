name: release

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  packages: write

jobs:
  plan:
    if: |
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.title, 'release: prepare v')
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: v
        run: |
          set -euo pipefail
          v=$(grep -m1 '^version = ' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          echo "version=${v}" >> "$GITHUB_OUTPUT"

  build:
    needs: plan
    strategy:
      fail-fast: false
      matrix:
        runtime:
          - asset
          - drive
          - explore
          - follow
          - frame
          - joint
          - localize
          - map
          - mission
          - motion
          - odometry
          - perception
          - plan
          - power
          - presence
          - router
          - safety
          - video
        platform: [linux/amd64, linux/arm64]
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            short: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            short: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:buildx-stable-1

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push per-platform image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.runtime
          platforms: ${{ matrix.platform }}
          build-args: |
            RUNTIME_NAME=${{ matrix.runtime }}
          tags: ghcr.io/phoxal/runtime-${{ matrix.runtime }}:${{ needs.plan.outputs.version }}-${{ matrix.short }}
          push: true
          cache-from: type=gha,scope=runtime-${{ matrix.runtime }}-${{ matrix.short }}
          cache-to: type=gha,mode=max,scope=runtime-${{ matrix.runtime }}-${{ matrix.short }}
          labels: |
            org.opencontainers.image.source=https://github.com/phoxal/framework
            org.opencontainers.image.version=${{ needs.plan.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=phoxal-runtime-${{ matrix.runtime }}
            org.opencontainers.image.licenses=AGPL-3.0-only

  build-binaries:
    needs: plan
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
          - target: aarch64-apple-darwin
            runner: macos-14
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}

      - name: Install native build dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            clang \
            cmake \
            nasm \
            pkg-config

      - name: Build release binaries
        run: |
          set -euo pipefail
          runtimes=(asset drive explore follow frame joint localize map mission motion odometry perception plan power presence router safety video)
          args=()
          for r in "${runtimes[@]}"; do
            args+=(--bin "phoxal-runtime-${r}")
          done
          cargo build --release --target ${{ matrix.target }} "${args[@]}"

      - name: Package each runtime
        run: |
          set -euo pipefail
          mkdir -p dist
          for r in asset drive explore follow frame joint localize map mission motion odometry perception plan power presence router safety video; do
            bin=target/${{ matrix.target }}/release/phoxal-runtime-${r}
            tar -czf "dist/phoxal-runtime-${r}-${{ needs.plan.outputs.version }}-${{ matrix.target }}.tar.gz" \
              -C "$(dirname "$bin")" "$(basename "$bin")"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: runtime-binaries-${{ matrix.target }}
          path: dist/*.tar.gz

  manifest:
    needs: [plan, build]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        runtime:
          - asset
          - drive
          - explore
          - follow
          - frame
          - joint
          - localize
          - map
          - mission
          - motion
          - odometry
          - perception
          - plan
          - power
          - presence
          - router
          - safety
          - video
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest
        run: |
          set -euo pipefail
          v=${{ needs.plan.outputs.version }}
          name=ghcr.io/phoxal/runtime-${{ matrix.runtime }}
          docker buildx imagetools create -t "${name}:${v}" \
            "${name}:${v}-amd64" "${name}:${v}-arm64"
          docker buildx imagetools create -t "${name}:latest" \
            "${name}:${v}-amd64" "${name}:${v}-arm64"

  publish:
    needs: [plan, manifest, build-binaries]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release notes
        run: |
          set -euo pipefail
          v=${{ needs.plan.outputs.version }}
          binary_targets="x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu aarch64-apple-darwin"
          cp CHANGELOG.md release-notes.md
          {
            echo ""
            echo "## Runtime images @ v${v}"
            for r in asset drive explore follow frame joint localize map mission motion odometry perception plan power presence router safety video; do
              echo "- \`ghcr.io/phoxal/runtime-${r}:${v}\`"
            done
            echo ""
            echo "## Runtime binaries @ v${v}"
            echo ""
            echo "Each runtime is also published as a standalone binary for systemd-style deployment:"
            for r in asset drive explore follow frame joint localize map mission motion odometry perception plan power presence router safety video; do
              for target in ${binary_targets}; do
                echo "- \`phoxal-runtime-${r}-${v}-${target}.tar.gz\`"
              done
            done
          } >> release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          v=${{ needs.plan.outputs.version }}
          gh release create "v${v}" \
            --title "v${v}" \
            --notes-file release-notes.md \
            --target main \
            dist/*.tar.gz
