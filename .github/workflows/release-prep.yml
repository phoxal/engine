name: release-prep

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-prep
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install git-cliff
        uses: kenji-miyake/setup-git-cliff@v2
        with:
          version: 2.7.0

      - name: Compute next version
        id: bump
        run: |
          set -euo pipefail
          last_tag=$(git describe --tags --match 'v*.*.*' --abbrev=0 2>/dev/null || echo "v0.0.0")
            current_version=$(grep -m1 '^version = ' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
            if ! git rev-parse "v${current_version}" >/dev/null 2>&1 && [ "${current_version}" != "${last_tag#v}" ]; then
              echo "Cargo.toml is at ${current_version} which is not yet tagged; release.yml is likely in flight. Skipping."
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            
          commits=$(git log --format="%s%n%n%b" "${last_tag}..HEAD" 2>/dev/null || git log --format="%s%n%n%b")
          if echo "$commits" | grep -qE "^[a-z]+(\([^)]+\))?!:" || echo "$commits" | grep -qE "^BREAKING CHANGE:"; then
            bump=major
          elif echo "$commits" | grep -qE "^feat(\([^)]+\))?:"; then
            bump=minor
          elif echo "$commits" | grep -qE "^fix(\([^)]+\))?:"; then
            bump=patch
          else
            echo "No bumping commits since ${last_tag}; nothing to propose."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          last_version="${last_tag#v}"
          base_version="${last_version%%-*}"
          IFS='.' read -r major minor patch <<< "$base_version"
          case "$bump" in
            major) major=$((major+1)); minor=0; patch=0 ;;
            minor) minor=$((minor+1)); patch=0 ;;
            patch) patch=$((patch+1)) ;;
          esac
          new_version="${major}.${minor}.${patch}"
          echo "version=${new_version}" >> "$GITHUB_OUTPUT"
          echo "bump=${bump}" >> "$GITHUB_OUTPUT"
          echo "last_tag=${last_tag}" >> "$GITHUB_OUTPUT"

      - name: Update Cargo.toml workspace version
        if: steps.bump.outputs.skip != 'true'
        run: |
          set -euo pipefail
          if grep -q '^\[workspace.package\]' Cargo.toml; then
            sed -i 's/^version = ".*"/version = "${{ steps.bump.outputs.version }}"/' Cargo.toml
          else
            python3 - <<'PY'
          import pathlib
          import re

          p = pathlib.Path("Cargo.toml")
          t = p.read_text()
          t = re.sub(r'(\[package\][^\[]*?\nversion = ")[^"]+(")', r'\g<1>${{ steps.bump.outputs.version }}\g<2>', t, count=1, flags=re.DOTALL)
          p.write_text(t)
          PY
          fi

      - name: Regenerate CHANGELOG.md
        if: steps.bump.outputs.skip != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git-cliff --tag v${{ steps.bump.outputs.version }} -o CHANGELOG.md

      - name: Write PR body
        if: steps.bump.outputs.skip != 'true'
        run: |
          cat > "$RUNNER_TEMP/release-prep-body.md" <<'BODY'
          Auto-generated by `release-prep`.

          Bumps the workspace version from `${{ steps.bump.outputs.last_tag }}` to **v${{ steps.bump.outputs.version }}** based on the `${{ steps.bump.outputs.bump }}` bump rule (conventional commits since the last tag).

          Merging this PR triggers `release.yml`, which tags `v${{ steps.bump.outputs.version }}`, builds artifacts, and publishes the GitHub Release.

          Review the bump version and the updated `CHANGELOG.md` below before merging.

          ## Changelog preview
          BODY
          sed -n '1,220p' CHANGELOG.md >> "$RUNNER_TEMP/release-prep-body.md"

      - name: Open release-prep PR
        if: steps.bump.outputs.skip != 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "release: prepare v${{ steps.bump.outputs.version }}"
          title: "release: prepare v${{ steps.bump.outputs.version }}"
          body-path: ${{ runner.temp }}/release-prep-body.md
          branch: release-prep/v${{ steps.bump.outputs.version }}
          base: main
          delete-branch: true
          signoff: true
