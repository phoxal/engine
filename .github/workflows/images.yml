name: build-images

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build + push runtime images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push
        env:
          VERSION: ${{ steps.version.outputs.version }}
          PUSH: "1"
        run: ./scripts/build-images.sh

      - name: Summary
        run: |
          echo "## Runtime images @ ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          for r in asset drive explore follow frame joint localize map mission motion odometry perception plan power presence router safety video; do
            echo "- \`ghcr.io/phoxal/runtime-${r}:${{ steps.version.outputs.version }}\`" >> "$GITHUB_STEP_SUMMARY"
          done
